<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" width="280" height="80">
  <g transform="translate(0, 10)">
    <!-- Wordmark: "Origin Labs" -->
    <g>
      <!-- "Origin" - DARKER TURQUOISE -->
      <text x="0" y="40"
            font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
            font-size="36"
            font-weight="700"
            fill="#20B0A0"
            letter-spacing="-0.5">Origin</text>

      <!-- "Labs" - BOLD BLACK (weight 800) -->
      <text x="108" y="40"
            font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
            font-size="36"
            font-weight="800"
            fill="#000000"
            letter-spacing="0">Labs</text>
    </g>

    <!-- Tagline - NORMAL SPACING, CENTERED UNDER WORDMARK -->
    <text x="95" y="60"
          font-family="'Inter', -apple-system, system-ui, sans-serif"
          font-size="10"
          font-weight="500"
          fill="#64748B"
          text-anchor="middle"
          letter-spacing="1">Human . AI</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" width="300" height="80">
  <defs>
    <!-- Copper/Bronze gradient for Origin -->
    <linearGradient id="copperGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#B87333"/>
      <stop offset="50%" style="stop-color:#CD7F32"/>
      <stop offset="100%" style="stop-color:#D4A574"/>
    </linearGradient>
  </defs>

  <g transform="translate(0, 10)">
    <!-- Wordmark: "Origin Labs" - TIGHT SPACING, NO LOGO -->
    <g>
      <!-- "Origin" - COPPER/BRONZE -->
      <text x="0" y="40"
            font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
            font-size="36"
            font-weight="700"
            fill="url(#copperGradient)"
            letter-spacing="-0.5">Origin</text>

      <!-- "Labs" - BOLD BLACK THICK -->
      <text x="115" y="40"
            font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
            font-size="36"
            font-weight="900"
            fill="#000000"
            letter-spacing="0">Labs</text>
    </g>

    <!-- Tagline -->
    <text x="0" y="60"
          font-family="'Inter', -apple-system, system-ui, sans-serif"
          font-size="9"
          font-weight="500"
          fill="#64748B"
          letter-spacing="1">Infrastructure between human &amp; AI</text>
  </g>
</svg>

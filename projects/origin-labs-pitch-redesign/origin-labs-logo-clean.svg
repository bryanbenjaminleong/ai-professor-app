<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 100" width="450" height="100">
  <defs>
    <!-- Futuristic AI gradient -->
    <linearGradient id="aiGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0052FF"/>
      <stop offset="50%" style="stop-color:#00A8FF"/>
      <stop offset="100%" style="stop-color:#00D4FF"/>
    </linearGradient>
  </defs>

  <g transform="translate(10, 15)">
    <!-- Stylized "O" as origin point with circuit pattern -->
    <g transform="translate(0, 5)">
      <!-- Main circle -->
      <circle cx="24" cy="30" r="24" fill="none" stroke="url(#aiGradient)" stroke-width="3"/>

      <!-- Circuit traces inside -->
      <path d="M 24 14 L 24 22 M 24 38 L 24 46"
            stroke="url(#aiGradient)" stroke-width="2" stroke-linecap="round"/>
      <path d="M 12 30 L 20 30 M 28 30 L 36 30"
            stroke="url(#aiGradient)" stroke-width="2" stroke-linecap="round"/>

      <!-- Center node -->
      <circle cx="24" cy="30" r="5" fill="url(#aiGradient)"/>

      <!-- Corner nodes -->
      <circle cx="24" cy="14" r="2" fill="#00D4FF"/>
      <circle cx="24" cy="46" r="2" fill="#00D4FF"/>
      <circle cx="8" cy="30" r="2" fill="#00D4FF"/>
      <circle cx="40" cy="30" r="2" fill="#00D4FF"/>
    </g>

    <!-- Integrated text -->
    <text x="60" y="42"
          font-family="Inter, -apple-system, system-ui, sans-serif"
          font-size="36"
          font-weight="700"
          letter-spacing="-0.5">
      <tspan fill="url(#aiGradient)">Origin</tspan>
      <tspan fill="#0F172A" font-weight="300" letter-spacing="1"> Labs</tspan>
    </text>

    <!-- Accent underline -->
    <line x1="60" y1="52" x2="280" y2="52"
          stroke="url(#aiGradient)" stroke-width="1.5" opacity="0.4"/>
  </g>
</svg>

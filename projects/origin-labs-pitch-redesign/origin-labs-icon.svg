<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="originGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Outer circle -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="url(#originGradient)" stroke-width="4"/>

  <!-- Inner intersecting arcs -->
  <path d="M 26 50 A 24 24 0 0 1 74 50" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round"/>
  <path d="M 74 50 A 24 24 0 0 1 26 50" fill="none" stroke="#0ea5e9" stroke-width="3" stroke-linecap="round"/>

  <!-- Center origin point -->
  <circle cx="50" cy="50" r="5" fill="#2563eb"/>
</svg>

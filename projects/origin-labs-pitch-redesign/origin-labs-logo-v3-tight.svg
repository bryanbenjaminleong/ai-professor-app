<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 100" width="380" height="100">
  <defs>
    <!-- Primary gradient: Electric blue to cyan -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0052FF"/>
      <stop offset="100%" style="stop-color:#00D4FF"/>
    </linearGradient>

    <!-- Glow filter - only for the symbol -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(15, 15)">
    <!-- The "O" as a neural network node - the origin point -->
    <g transform="translate(0, 6)">
      <!-- Outer hexagonal frame (futuristic) -->
      <polygon points="24,3 44,15 44,39 24,51 4,39 4,15"
               fill="none"
               stroke="url(#primaryGradient)"
               stroke-width="2"
               filter="url(#glow)"/>

      <!-- Inner circle (the origin core) -->
      <circle cx="24" cy="27" r="10" fill="url(#primaryGradient)" opacity="0.15"/>
      <circle cx="24" cy="27" r="6" fill="url(#primaryGradient)"/>

      <!-- Neural network connections radiating from center -->
      <g stroke="#00D4FF" stroke-width="1" opacity="0.6">
        <line x1="24" y1="21" x2="24" y2="9"/>
        <line x1="30" y1="27" x2="40" y2="27"/>
        <line x1="24" y1="33" x2="24" y2="45"/>
        <line x1="18" y1="27" x2="8" y2="27"/>
        <line x1="29" y1="22" x2="37" y2="14"/>
        <line x1="29" y1="32" x2="37" y2="40"/>
      </g>

      <!-- Small node points -->
      <g fill="#00D4FF">
        <circle cx="24" cy="9" r="1.5"/>
        <circle cx="40" cy="27" r="1.5"/>
        <circle cx="24" cy="45" r="1.5"/>
        <circle cx="8" cy="27" r="1.5"/>
        <circle cx="37" cy="14" r="1"/>
        <circle cx="37" cy="40" r="1"/>
      </g>
    </g>

    <!-- Wordmark: "Origin Labs" -->
    <g transform="translate(58, 0)">
      <!-- "Origin" - SHARP, no blur, gradient -->
      <text x="0" y="40"
            font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
            font-size="36"
            font-weight="700"
            fill="url(#primaryGradient)"
            letter-spacing="-0.5">Origin</text>

      <!-- "Labs" - BOLD, BLACK, THICK - positioned closer -->
      <text x="120" y="40"
            font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
            font-size="36"
            font-weight="900"
            fill="#000000"
            letter-spacing="0">Labs</text>
    </g>

    <!-- Tagline -->
    <text x="58" y="60"
          font-family="'Inter', -apple-system, system-ui, sans-serif"
          font-size="8"
          font-weight="500"
          fill="#64748B"
          letter-spacing="2">INFRASTRUCTURE FOR HUMAN-AI COLLABORATION</text>
  </g>
</svg>

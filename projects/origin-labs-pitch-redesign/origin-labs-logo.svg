<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <defs>
    <!-- Gradient for the symbol -->
    <linearGradient id="originGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Symbol: Origin Point -->
  <g transform="translate(12, 12)">
    <!-- Outer circle -->
    <circle cx="38" cy="38" r="36" fill="none" stroke="url(#originGradient)" stroke-width="3"/>

    <!-- Inner intersecting arcs representing human-AI collaboration -->
    <!-- Left arc (human) -->
    <path d="M 20 38 A 18 18 0 0 1 56 38" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Right arc (AI) -->
    <path d="M 56 38 A 18 18 0 0 1 20 38" fill="none" stroke="#0ea5e9" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Center origin point -->
    <circle cx="38" cy="38" r="4" fill="#2563eb"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(100, 28)">
    <!-- "Origin" in primary blue -->
    <text x="0" y="32" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="32" font-weight="700" fill="#2563eb" letter-spacing="-0.5">Origin</text>

    <!-- "Labs" in deep navy -->
    <text x="110" y="32" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="32" font-weight="700" fill="#0f172a" letter-spacing="-0.5">Labs</text>
  </g>
</svg>

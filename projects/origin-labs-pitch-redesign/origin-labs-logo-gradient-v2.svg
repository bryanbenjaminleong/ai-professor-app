<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 150" width="550" height="150">
  <defs>
    <!-- Futuristic gradient -->
    <linearGradient id="futuristicGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0052FF"/>
      <stop offset="50%" style="stop-color:#00A8FF"/>
      <stop offset="100%" style="stop-color:#00D4FF"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0052FF" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Geometric design elements around the text -->
  <g opacity="0.2">
    <!-- Left side: Circuit pattern -->
    <g transform="translate(10, 30)">
      <circle cx="20" cy="20" r="8" fill="none" stroke="url(#futuristicGrad)" stroke-width="2"/>
      <circle cx="20" cy="20" r="3" fill="url(#futuristicGrad)"/>
      <line x1="28" y1="20" x2="50" y2="20" stroke="url(#futuristicGrad)" stroke-width="2"/>
      <circle cx="50" cy="20" r="2" fill="#00D4FF"/>

      <circle cx="20" cy="50" r="6" fill="none" stroke="url(#futuristicGrad)" stroke-width="2"/>
      <circle cx="20" cy="50" r="2" fill="url(#futuristicGrad)"/>
      <line x1="26" y1="50" x2="45" y2="50" stroke="url(#futuristicGrad)" stroke-width="1.5"/>
      <line x1="45" y1="50" x2="45" y2="35" stroke="url(#futuristicGrad)" stroke-width="1.5"/>
      <circle cx="45" cy="35" r="2" fill="#00A8FF"/>
    </g>

    <!-- Right side: Circuit pattern -->
    <g transform="translate(460, 30)">
      <circle cx="20" cy="20" r="8" fill="none" stroke="url(#futuristicGrad)" stroke-width="2"/>
      <circle cx="20" cy="20" r="3" fill="url(#futuristicGrad)"/>
      <line x1="12" y1="20" x2="-10" y2="20" stroke="url(#futuristicGrad)" stroke-width="2"/>
      <circle cx="-10" cy="20" r="2" fill="#00D4FF"/>

      <circle cx="20" cy="50" r="6" fill="none" stroke="url(#futuristicGrad)" stroke-width="2"/>
      <circle cx="20" cy="50" r="2" fill="url(#futuristicGrad)"/>
      <line x1="14" y1="50" x2="-5" y2="50" stroke="url(#futuristicGrad)" stroke-width="1.5"/>
      <line x1="-5" y1="50" x2="-5" y2="35" stroke="url(#futuristicGrad)" stroke-width="1.5"/>
      <circle cx="-5" cy="35" r="2" fill="#00A8FF"/>
    </g>

    <!-- Top decorative line -->
    <line x1="100" y1="10" x2="450" y2="10" stroke="url(#futuristicGrad)" stroke-width="1"/>
    <circle cx="100" cy="10" r="3" fill="#00D4FF"/>
    <circle cx="450" cy="10" r="3" fill="#0052FF"/>

    <!-- Bottom decorative line -->
    <line x1="120" y1="140" x2="430" y2="140" stroke="url(#futuristicGrad)" stroke-width="1"/>
    <circle cx="120" cy="140" r="3" fill="#00A8FF"/>
    <circle cx="430" cy="140" r="3" fill="#00D4FF"/>
  </g>

  <!-- Corner brackets (futuristic frame) -->
  <g stroke="url(#futuristicGrad)" stroke-width="2" fill="none" opacity="0.3">
    <!-- Top left bracket -->
    <path d="M 70 25 L 70 15 L 90 15"/>
    <!-- Top right bracket -->
    <path d="M 460 25 L 460 15 L 480 15"/>
    <!-- Bottom left bracket -->
    <path d="M 70 125 L 70 135 L 90 135"/>
    <!-- Bottom right bracket -->
    <path d="M 460 125 L 460 135 L 480 135"/>
  </g>

  <!-- Main text -->
  <g transform="translate(100, 50)" filter="url(#shadow)">
    <!-- "Origin" with gradient and glow -->
    <text x="0" y="50"
          font-family="Inter, -apple-system, system-ui, sans-serif"
          font-size="52"
          font-weight="800"
          fill="url(#futuristicGrad)"
          letter-spacing="-1"
          filter="url(#glow)">Origin</text>

    <!-- "Labs" with gradient and glow -->
    <text x="195" y="50"
          font-family="Inter, -apple-system, system-ui, sans-serif"
          font-size="52"
          font-weight="800"
          fill="url(#futuristicGrad)"
          letter-spacing="2"
          filter="url(#glow)">Labs</text>
  </g>

  <!-- Accent underline with gradient -->
  <rect x="100" y="108" width="350" height="4" rx="2" fill="url(#futuristicGrad)" opacity="0.7"/>

  <!-- Small nodes at the ends of the underline -->
  <circle cx="100" cy="110" r="4" fill="url(#futuristicGrad)"/>
  <circle cx="450" cy="110" r="4" fill="url(#futuristicGrad)"/>
</svg>

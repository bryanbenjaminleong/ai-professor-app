<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" width="280" height="80">
  <defs>
    <!-- Gold gradient for Origin -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4AF37"/>
      <stop offset="50%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#DAA520"/>
    </linearGradient>
  </defs>

  <g transform="translate(0, 10)">
    <!-- Wordmark: "Origin Labs" - NARROW SPACING, NO LOGO -->
    <g>
      <!-- "Origin" - GOLD GRADIENT -->
      <text x="0" y="40"
            font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
            font-size="36"
            font-weight="700"
            fill="url(#goldGradient)"
            letter-spacing="-0.5">Origin</text>

      <!-- "Labs" - BOLD BLACK (weight 800), NARROW SPACING -->
      <text x="108" y="40"
            font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
            font-size="36"
            font-weight="800"
            fill="#000000"
            letter-spacing="0">Labs</text>
    </g>

    <!-- Tagline - INITIAL CAPS -->
    <text x="0" y="60"
          font-family="'Inter', -apple-system, system-ui, sans-serif"
          font-size="9"
          font-weight="500"
          fill="#64748B"
          letter-spacing="1">Infrastructure Between Human &amp; AI</text>
  </g>
</svg>

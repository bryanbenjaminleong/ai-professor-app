<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="500" height="120">
  <defs>
    <!-- Primary gradient: Electric blue to cyan -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0052FF"/>
      <stop offset="100%" style="stop-color:#00D4FF"/>
    </linearGradient>

    <!-- Secondary gradient for depth -->
    <linearGradient id="depthGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF"/>
      <stop offset="100%" style="stop-color:#0052FF"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(20, 20)">
    <!-- The "O" as a neural network node - the origin point -->
    <g transform="translate(0, 8)">
      <!-- Outer hexagonal frame (futuristic) -->
      <polygon points="28,4 52,18 52,46 28,60 4,46 4,18"
               fill="none"
               stroke="url(#primaryGradient)"
               stroke-width="2.5"
               filter="url(#glow)"/>

      <!-- Inner circle (the origin core) -->
      <circle cx="28" cy="32" r="12" fill="url(#primaryGradient)" opacity="0.15"/>
      <circle cx="28" cy="32" r="8" fill="url(#primaryGradient)"/>

      <!-- Neural network connections radiating from center -->
      <g stroke="#00D4FF" stroke-width="1" opacity="0.6">
        <line x1="28" y1="24" x2="28" y2="10"/>
        <line x1="36" y1="32" x2="48" y2="32"/>
        <line x1="28" y1="40" x2="28" y2="54"/>
        <line x1="20" y1="32" x2="8" y2="32"/>
        <line x1="34" y1="26" x2="44" y2="16"/>
        <line x1="34" y1="38" x2="44" y2="48"/>
      </g>

      <!-- Small node points -->
      <g fill="#00D4FF">
        <circle cx="28" cy="10" r="2"/>
        <circle cx="48" cy="32" r="2"/>
        <circle cx="28" cy="54" r="2"/>
        <circle cx="8" cy="32" r="2"/>
        <circle cx="44" cy="16" r="1.5"/>
        <circle cx="44" cy="48" r="1.5"/>
      </g>
    </g>

    <!-- Wordmark: "Origin Labs" -->
    <g transform="translate(70, 0)">
      <!-- "Origin" with gradient -->
      <text x="0" y="48"
            font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
            font-size="42"
            font-weight="700"
            fill="url(#primaryGradient)"
            letter-spacing="-1"
            filter="url(#glow)">Origin</text>

      <!-- "Labs" - lighter weight, positioned to create visual hierarchy -->
      <text x="162" y="48"
            font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
            font-size="42"
            font-weight="300"
            fill="#0F172A"
            letter-spacing="2">Labs</text>
    </g>

    <!-- Tagline -->
    <text x="70" y="72"
          font-family="'Inter', -apple-system, system-ui, sans-serif"
          font-size="10"
          font-weight="500"
          fill="#64748B"
          letter-spacing="3">INFRASTRUCTURE FOR HUMAN-AI COLLABORATION</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Dark navy background -->
  <rect width="512" height="512" rx="108" fill="#0f172a"/>
  
  <!-- Three ascending chevrons - representing growth, levels of mastery -->
  <!-- Bottom chevron -->
  <path d="M128 320 L256 256 L384 320" fill="none" stroke="#FFFFFF" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" opacity="0.35"/>
  <!-- Middle chevron -->
  <path d="M156 262 L256 206 L356 262" fill="none" stroke="#FFFFFF" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" opacity="0.65"/>
  <!-- Top chevron (teal - brand color) -->
  <path d="M184 204 L256 156 L328 204" fill="none" stroke="#0d9488" stroke-width="36" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Thin teal underline accent -->
  <rect x="200" y="380" width="112" height="5" rx="2.5" fill="#0d9488"/>
</svg>
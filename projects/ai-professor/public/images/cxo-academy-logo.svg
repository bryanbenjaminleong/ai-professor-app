<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" width="400" height="80">
  <defs>
    <style>
      .icon { fill: #0d9488; }
      .wordmark { fill: #0A1628; font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 36px; letter-spacing: -0.5px; }
      .tagline { fill: #64748b; font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif; font-weight: 400; font-size: 10px; letter-spacing: 0.5px; }
    </style>
  </defs>

  <!-- Icon Mark: Geometric C with ascending chevrons -->
  <g transform="translate(8, 4)">
    <!-- Outer C -->
    <path class="icon" d="M36 4A32.9 32.9 0 0 0 11 17l8.2 8.2A21.2 21.2 0 1 1 16 36H4A36 36 0 1 0 36 4Z"/>
    <!-- Chevron 1 (lower, larger) -->
    <path d="M22 40l14-10 14 10" fill="none" stroke="#0d9488" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Chevron 2 (upper, smaller) -->
    <path d="M27 29l9-7 9 7" fill="none" stroke="#0d9488" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <text class="wordmark" x="96" y="42">CXO Academy</text>

  <!-- Tagline -->
  <text class="tagline" x="97" y="58">WHERE LEADERS LEARN TO LEAD IN THE AGE OF AI</text>
</svg>

<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <!-- 9founders Logo - v15: Accent under "founders" -->
  <!-- Red accent line under "founders", thicker font weight -->
  
  <defs>
    <style>
      .digit { 
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
        font-weight: 800;
        font-size: 70px;
        fill: #FF2800;
      }
      .word {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-weight: 900;
        font-size: 60px;
        fill: #333333;
      }
      .accent {
        fill: #FF2800;
      }
    </style>
  </defs>
  
  <!-- 9 -->
  <text x="50" y="78" class="digit">9</text>
  
  <!-- founders with accent line -->
  <text x="95" y="75" class="word">founders</text>
  <rect x="95" y="82" width="240" height="3" rx="2" class="accent"/>
</svg>
<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <!-- 9founders Logo - v10: Subtle Gradient on 9 -->
  <!-- "9" with red gradient for depth, "founders" in dark gray -->
  
  <defs>
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF3D1F"/>
      <stop offset="100%" style="stop-color:#CC1F00"/>
    </linearGradient>
    <style>
      .digit { 
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
        font-weight: 800;
        font-size: 70px;
        fill: url(#redGradient);
      }
      .word {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-weight: 700;
        font-size: 60px;
        fill: #333333;
      }
    </style>
  </defs>
  
  <text x="50" y="78" class="digit">9</text>
  <text x="95" y="75" class="word">founders</text>
</svg>
<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <!-- 9founders Logo - Version 1 -->
  <!-- "9" in coral/salmon, "founders" in black -->
  
  <defs>
    <style>
      .digit { 
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
        font-weight: 700;
        font-size: 64px;
        fill: #FF6B6B;
      }
      .word {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-weight: 800;
        font-size: 64px;
        fill: #1a1a1a;
      }
    </style>
  </defs>
  
  <!-- 9 -->
  <text x="50" y="75" class="digit">9</text>
  
  <!-- founders -->
  <text x="90" y="75" class="word">founders</text>
</svg>
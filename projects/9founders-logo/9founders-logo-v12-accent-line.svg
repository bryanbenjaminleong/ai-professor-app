<svg width="400" height="130" viewBox="0 0 400 130" xmlns="http://www.w3.org/2000/svg">
  <!-- 9founders Logo - v12: Accent Line -->
  <!-- Red underline accent beneath "9" -->
  
  <defs>
    <style>
      .digit { 
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
        font-weight: 800;
        font-size: 70px;
        fill: #FF2800;
      }
      .word {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-weight: 800;
        font-size: 60px;
        fill: #333333;
      }
    </style>
  </defs>
  
  <text x="50" y="78" class="digit">9</text>
  <text x="95" y="75" class="word">founders</text>
  
  <!-- Accent line under 9 -->
  <line x1="52" y1="88" x2="88" y2="88" stroke="#FF2800" stroke-width="3" stroke-linecap="round"/>
</svg>
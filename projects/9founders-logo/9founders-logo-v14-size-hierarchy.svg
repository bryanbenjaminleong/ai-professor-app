<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <!-- 9founders Logo - v14: Size Hierarchy -->
  <!-- Larger "9", slightly smaller "founders" -->
  
  <defs>
    <style>
      .digit { 
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
        font-weight: 800;
        font-size: 82px;
        fill: #FF2800;
      }
      .word {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-weight: 700;
        font-size: 52px;
        fill: #333333;
        letter-spacing: 0.01em;
      }
    </style>
  </defs>
  
  <text x="45" y="82" class="digit">9</text>
  <text x="110" y="74" class="word">founders</text>

<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <!-- 9founders Logo - Version 4 -->
  <!-- "9" in gold/amber, "founders" in black -->
  
  <defs>
    <style>
      .digit { 
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
        font-weight: 800;
        font-size: 70px;
        fill: #F59E0B;
      }
      .word {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-weight: 800;
        font-size: 60px;
        fill: #1a1a1a;
      }
    </style>
  </defs>
  
  <!-- 9 -->
  <text x="50" y="78" class="digit">9</text>
  
  <!-- founders -->
  <text x="108" y="75" class="word">founders</text>
</svg>
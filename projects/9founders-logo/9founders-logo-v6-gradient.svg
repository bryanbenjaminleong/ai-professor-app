<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <!-- 9founders Logo - Version 6 (Gradient) -->
  <!-- "9" with gradient, "founders" in black -->
  
  <defs>
    <linearGradient id="nineGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
    <style>
      .digit { 
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
        font-weight: 800;
        font-size: 70px;
        fill: url(#nineGradient);
      }
      .word {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-weight: 800;
        font-size: 60px;
        fill: #1a1a1a;
      }
    </style>
  </defs>
  
  <!-- 9 -->
  <text x="50" y="78" class="digit">9</text>
  
  <!-- founders -->
  <text x="108" y="75" class="word">founders</text>
</svg>